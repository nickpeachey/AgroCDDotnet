name: CI/CD Workflow

on:
  push:
    branches: [ main ]

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  API_IMAGE_NAME: agrocd-api
  DB_IMAGE_NAME: agrocd-db-migrator
  GHCR_REGISTRY: ghcr.io
  GHCR_USERNAME: ${{ github.repository_owner }}

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.vars.outputs.tag }}
      api_image: ${{ steps.vars.outputs.api_image }}
      db_image: ${{ steps.vars.outputs.db_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Run Postgres-backed .NET integration tests
        run: dotnet test AgroCDDotnet.Api.Tests/AgroCDDotnet.Api.Tests.csproj --configuration Release --filter "TestTarget=InMemory"

      - name: Set output
        id: vars
        run: |
          TAG=${GITHUB_SHA::7}
          API_IMAGE=${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.API_IMAGE_NAME }}:${TAG}
          DB_IMAGE=${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.DB_IMAGE_NAME }}:${TAG}
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "api_image=${API_IMAGE}" >> $GITHUB_OUTPUT
          echo "db_image=${DB_IMAGE}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        run: |
          IMAGE_PATH=${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.API_IMAGE_NAME }}
          docker build -t ${IMAGE_PATH}:${{ steps.vars.outputs.tag }} -t ${IMAGE_PATH}:latest .
          docker push ${IMAGE_PATH}:${{ steps.vars.outputs.tag }}
          docker push ${IMAGE_PATH}:latest

      - name: Build and push database migrator image
        run: |
          IMAGE_PATH=${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.DB_IMAGE_NAME }}
          docker build -f Dockerfile.database -t ${IMAGE_PATH}:${{ steps.vars.outputs.tag }} -t ${IMAGE_PATH}:latest .
          docker push ${IMAGE_PATH}:${{ steps.vars.outputs.tag }}
          docker push ${IMAGE_PATH}:latest

      - name: Cleanup runner state
        if: always()
        run: |
          API_IMAGE_PATH=${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.API_IMAGE_NAME }}
          DB_IMAGE_PATH=${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.DB_IMAGE_NAME }}
          docker system df || true
          docker image rm ${API_IMAGE_PATH}:${{ steps.vars.outputs.tag }} ${API_IMAGE_PATH}:latest || true
          docker image rm ${DB_IMAGE_PATH}:${{ steps.vars.outputs.tag }} ${DB_IMAGE_PATH}:latest || true
          git clean -fdx
          docker builder prune -af || true
          docker image prune -af || true
          docker system df || true
          df -h

  deploy-dev:
    needs: build
    runs-on: self-hosted
    permissions:
      contents: write
    outputs:
      release_dev_revision: ${{ steps.push-release-dev.outputs.release_dev_revision }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release/dev branch
        run: |
          git fetch origin main
          if git ls-remote --exit-code --heads origin release/dev; then
            git fetch origin release/dev
            echo "REMOTE_RELEASE_DEV_SHA=$(git rev-parse origin/release/dev)" >> $GITHUB_ENV
          fi
          git checkout -B release/dev origin/main

      - name: Create or update dev GHCR pull secret
        env:
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          GHCR_PULL_PASSWORD: ${{ secrets.GHCR_PULL_PASSWORD }}
        run: |
          if [ -z "$GHCR_PULL_USERNAME" ] || [ -z "$GHCR_PULL_PASSWORD" ]; then
            echo "GHCR_PULL_USERNAME and GHCR_PULL_PASSWORD repository secrets must be configured."
            exit 1
          fi

          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace api-dev \
            --docker-server=${{ env.GHCR_REGISTRY }} \
            --docker-username="$GHCR_PULL_USERNAME" \
            --docker-password="$GHCR_PULL_PASSWORD" \
            --docker-email="unused@example.com" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Update Dev Kustomize
        run: |
          cd gitops/overlays/dev
          kustomize edit set image agrocd-api=${{ needs.build.outputs.api_image }}
          kustomize edit set image agrocd-db-migrator=${{ needs.build.outputs.db_image }}

      - name: Commit and Push changes (Dev)
        id: push-release-dev
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Update dev images to ${{ needs.build.outputs.image_tag }}" || echo "No changes to commit"
          if [ -n "${REMOTE_RELEASE_DEV_SHA:-}" ]; then
            git push --force-with-lease=refs/heads/release/dev:${REMOTE_RELEASE_DEV_SHA} https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:release/dev
          else
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:release/dev
          fi
          RELEASE_DEV_REVISION=$(git rev-parse HEAD)
          echo "release_dev_revision=${RELEASE_DEV_REVISION}" >> $GITHUB_OUTPUT
          echo "Pushed release/dev revision: ${RELEASE_DEV_REVISION}"
          echo "Expected API image: ${{ needs.build.outputs.api_image }}"
          echo "Expected DB image: ${{ needs.build.outputs.db_image }}"

      - name: Cleanup runner state
        if: always()
        run: |
          git clean -fdx
          df -h

  validation:
    needs: [build, deploy-dev]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Wait for ArgoCD sync
        run: |
          EXPECTED_API_IMAGE="${{ needs.build.outputs.api_image }}"
          EXPECTED_DB_IMAGE="${{ needs.build.outputs.db_image }}"
          EXPECTED_REVISION="${{ needs.deploy-dev.outputs.release_dev_revision }}"
          CURRENT_API_IMAGE=""
          CURRENT_DB_IMAGE=""
          CURRENT_REVISION=""

          for _ in $(seq 1 60); do
            CURRENT_API_IMAGE=$(kubectl get deployment/agrocd-api -n api-dev -o jsonpath='{.spec.template.spec.containers[0].image}')
            CURRENT_DB_IMAGE=$(kubectl get job/agrocd-db-migrator -n api-dev -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || true)
            CURRENT_REVISION=$(kubectl get application api-dev -n argocd -o jsonpath='{.status.sync.revision}')
            echo "Current API image: $CURRENT_API_IMAGE"
            echo "Current DB migrator image: $CURRENT_DB_IMAGE"
            echo "Current Argo revision: $CURRENT_REVISION"

            if [ "$CURRENT_API_IMAGE" = "$EXPECTED_API_IMAGE" ] && [ "$CURRENT_DB_IMAGE" = "$EXPECTED_DB_IMAGE" ] && [ "$CURRENT_REVISION" = "$EXPECTED_REVISION" ]; then
              break
            fi

            sleep 5
          done

          if [ "$CURRENT_API_IMAGE" != "$EXPECTED_API_IMAGE" ]; then
            echo "API deployment image did not update to expected value."
            exit 1
          fi

          if [ "$CURRENT_DB_IMAGE" != "$EXPECTED_DB_IMAGE" ]; then
            echo "Database migrator image did not update to expected value."
            exit 1
          fi

          if [ "$CURRENT_REVISION" != "$EXPECTED_REVISION" ]; then
            echo "ArgoCD application revision did not update to expected release/dev commit."
            echo "Expected revision: $EXPECTED_REVISION"
            echo "Actual revision: $CURRENT_REVISION"
            exit 1
          fi

          kubectl rollout status deployment/postgres -n api-dev --timeout=120s
          kubectl wait --for=condition=complete job/agrocd-db-migrator -n api-dev --timeout=120s
          kubectl rollout status deployment/agrocd-api -n api-dev --timeout=120s

      - name: Run deployed .NET integration tests
        run: |
          KIND_IP=$(docker inspect agrocd-control-plane -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}')
          echo "Found kind IP: $KIND_IP"

          INTEGRATION_TESTS_BASE_URL="$KIND_IP" \
          INTEGRATION_TESTS_HOST_HEADER="dev.local" \
          dotnet test AgroCDDotnet.Api.Tests/AgroCDDotnet.Api.Tests.csproj --configuration Release --filter "TestTarget=Deployed"

      - name: Run Postman integration tests
        run: |
          KIND_IP=$(docker inspect agrocd-control-plane -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}')
          echo "Found kind IP: $KIND_IP"

          newman run integration-tests.postman_collection.json \
            --env-var "base_url=$KIND_IP" \
            --env-var "host_header=dev.local" \
            --reporters cli

      - name: Cleanup runner state
        if: always()
        run: |
          git clean -fdx
          df -h

  promotion:
    needs: [build, validation]
    runs-on: self-hosted
    permissions:
      contents: write
    outputs:
      release_test_revision: ${{ steps.push-release-test.outputs.release_test_revision }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release/test branch
        run: |
          git fetch origin release/dev
          if git ls-remote --exit-code --heads origin release/test; then
            git fetch origin release/test
            echo "REMOTE_RELEASE_TEST_SHA=$(git rev-parse origin/release/test)" >> $GITHUB_ENV
          fi
          git checkout -B release/test origin/release/dev

      - name: Create or update test GHCR pull secret
        env:
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          GHCR_PULL_PASSWORD: ${{ secrets.GHCR_PULL_PASSWORD }}
        run: |
          if [ -z "$GHCR_PULL_USERNAME" ] || [ -z "$GHCR_PULL_PASSWORD" ]; then
            echo "GHCR_PULL_USERNAME and GHCR_PULL_PASSWORD repository secrets must be configured."
            exit 1
          fi

          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace api-test \
            --docker-server=${{ env.GHCR_REGISTRY }} \
            --docker-username="$GHCR_PULL_USERNAME" \
            --docker-password="$GHCR_PULL_PASSWORD" \
            --docker-email="unused@example.com" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Update Test Kustomize
        run: |
          cd gitops/overlays/test
          kustomize edit set image agrocd-api=${{ needs.build.outputs.api_image }}
          kustomize edit set image agrocd-db-migrator=${{ needs.build.outputs.db_image }}

      - name: Commit and Push changes (Test)
        id: push-release-test
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Promote app and db images to test: ${{ needs.build.outputs.image_tag }}" || echo "No changes to commit"
          if [ -n "${REMOTE_RELEASE_TEST_SHA:-}" ]; then
            git push --force-with-lease=refs/heads/release/test:${REMOTE_RELEASE_TEST_SHA} https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:release/test
          else
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:release/test
          fi
          RELEASE_TEST_REVISION=$(git rev-parse HEAD)
          echo "release_test_revision=${RELEASE_TEST_REVISION}" >> $GITHUB_OUTPUT
          echo "Pushed release/test revision: ${RELEASE_TEST_REVISION}"
          echo "Expected API image: ${{ needs.build.outputs.api_image }}"
          echo "Expected DB image: ${{ needs.build.outputs.db_image }}"

      - name: Cleanup runner state
        if: always()
        run: |
          git clean -fdx
          df -h
