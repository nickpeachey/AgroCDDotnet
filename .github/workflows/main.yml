name: CI/CD Workflow

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: agrocd-api
  GHCR_REGISTRY: ghcr.io
  GHCR_USERNAME: ${{ github.repository_owner }}

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.vars.outputs.tag }}
      full_image: ${{ steps.vars.outputs.full_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Run in-memory .NET integration tests
        run: dotnet test AgroCDDotnet.Api.Tests/AgroCDDotnet.Api.Tests.csproj --configuration Release --filter "TestTarget=InMemory"

      - name: Set output
        id: vars
        run: |
          TAG=${GITHUB_SHA::7}
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "full_image=${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${TAG}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        run: |
          IMAGE_PATH=${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          docker build -t ${IMAGE_PATH}:${{ steps.vars.outputs.tag }} -t ${IMAGE_PATH}:latest .
          docker push ${IMAGE_PATH}:${{ steps.vars.outputs.tag }}
          docker push ${IMAGE_PATH}:latest

      - name: Cleanup runner state
        if: always()
        run: |
          IMAGE_PATH=${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          docker system df || true
          docker image rm ${IMAGE_PATH}:${{ steps.vars.outputs.tag }} ${IMAGE_PATH}:latest || true
          git clean -fdx
          docker builder prune -af || true
          docker image prune -af || true
          docker system df || true
          df -h

  deploy-dev:
    needs: build
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Dev Kustomize
        run: |
          cd gitops/overlays/dev
          kustomize edit set image agrocd-api=${{ needs.build.outputs.full_image }}
          
      - name: Commit and Push changes (Dev)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add gitops/overlays/dev/kustomization.yaml
          git commit -m "Update dev image to ${{ needs.build.outputs.image_tag }}" || echo "No changes to commit"
          # Pull latest changes before pushing to avoid conflicts
          git pull --rebase origin main
          # Use the GITHUB_TOKEN to authorize the push
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Cleanup runner state
        if: always()
        run: |
          git clean -fdx
          df -h

  validation:
    needs: [build, deploy-dev]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Wait for ArgoCD sync
        run: |
          EXPECTED_IMAGE="${{ needs.build.outputs.full_image }}"
          CURRENT_IMAGE=""

          for _ in $(seq 1 60); do
            CURRENT_IMAGE=$(kubectl get deployment/agrocd-api -n api-dev -o jsonpath='{.spec.template.spec.containers[0].image}')
            echo "Current deployment image: $CURRENT_IMAGE"

            if [ "$CURRENT_IMAGE" = "$EXPECTED_IMAGE" ]; then
              break
            fi

            sleep 5
          done

          if [ "$CURRENT_IMAGE" != "$EXPECTED_IMAGE" ]; then
            echo "Deployment image did not update to expected value."
            echo "Expected: $EXPECTED_IMAGE"
            echo "Actual: $CURRENT_IMAGE"
            exit 1
          fi

          kubectl rollout status deployment/agrocd-api -n api-dev --timeout=120s

      - name: Run .NET integration tests
        run: |
          KIND_IP=$(docker inspect agrocd-control-plane -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}')
          echo "Found kind IP: $KIND_IP"

          INTEGRATION_TESTS_BASE_URL="$KIND_IP" \
          INTEGRATION_TESTS_HOST_HEADER="dev.local" \
          dotnet test AgroCDDotnet.Api.Tests/AgroCDDotnet.Api.Tests.csproj --configuration Release --filter "TestTarget=Deployed"

      - name: Integration Tests
        run: |
          # Use the kind cluster IP to hit the dev environment via Ingress
          # Since we are running in a container, localhost won't work
          KIND_IP=$(docker inspect agrocd-control-plane -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}')
          echo "Found kind IP: $KIND_IP"
          
          # Run Postman tests using Newman
          newman run integration-tests.postman_collection.json \
            --env-var "base_url=$KIND_IP" \
            --env-var "host_header=dev.local" \
            --reporters cli

      - name: Cleanup runner state
        if: always()
        run: |
          git clean -fdx
          df -h

  promotion:
    needs: [build, validation]
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Test Kustomize
        run: |
          cd gitops/overlays/test
          kustomize edit set image agrocd-api=${{ needs.build.outputs.full_image }}

      - name: Commit and Push changes (Test)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add gitops/overlays/test/kustomization.yaml
          git commit -m "Promote image to test: ${{ needs.build.outputs.image_tag }}" || echo "No changes to commit"
          # Pull latest changes before pushing to avoid conflicts
          git pull --rebase origin main
          # Use the GITHUB_TOKEN to authorize the push
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Cleanup runner state
        if: always()
        run: |
          git clean -fdx
          df -h
