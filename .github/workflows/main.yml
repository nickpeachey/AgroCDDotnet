name: CI/CD Workflow

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: agrocd-api
  GHCR_REGISTRY: ghcr.io
  GHCR_USERNAME: ${{ github.repository_owner }}

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.vars.outputs.tag }}
      full_image: ${{ steps.vars.outputs.full_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Set output
        id: vars
        run: |
          TAG=${GITHUB_SHA::7}
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "full_image=${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${TAG}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        run: |
          IMAGE_PATH=${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          docker build -t ${IMAGE_PATH}:${{ steps.vars.outputs.tag }} -t ${IMAGE_PATH}:latest .
          docker push ${IMAGE_PATH}:${{ steps.vars.outputs.tag }}
          docker push ${IMAGE_PATH}:latest

  deploy-dev:
    needs: build
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update Dev Kustomize
        run: |
          cd gitops/overlays/dev
          kustomize edit set image agrocd-api=${{ needs.build.outputs.full_image }}
          
      - name: Apply Dev manifests
        run: |
          kubectl apply -k gitops/overlays/dev
          
      - name: Commit and Push changes (Dev)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add gitops/overlays/dev/kustomization.yaml
          git commit -m "Update dev image to ${{ needs.build.outputs.image_tag }}" || echo "No changes to commit"
          # Use the GITHUB_TOKEN to authorize the push
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

  validation:
    needs: [build, deploy-dev]
    runs-on: self-hosted
    steps:
      - name: Wait for ArgoCD sync
        run: |
          # Wait for the new version to be rolled out by ArgoCD
          kubectl rollout status deployment/agrocd-api -n api-dev --timeout=120s

      - name: Integration Tests
        run: |
          # Use the Host header to hit the dev environment via Ingress
          RESPONSE_CODE=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dev.local" http://localhost/weatherforecast)
          
          if [ "$RESPONSE_CODE" -eq 200 ]; then
            echo "Integration tests passed against dev.local"
          else
            echo "Integration tests failed with HTTP $RESPONSE_CODE"
            exit 1
          fi

  promotion:
    needs: [build, validation]
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update Test Kustomize
        run: |
          cd gitops/overlays/test
          kustomize edit set image agrocd-api=${{ needs.build.outputs.full_image }}

      - name: Apply Test manifests
        run: |
          kubectl apply -k gitops/overlays/test

      - name: Commit and Push changes (Test)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add gitops/overlays/test/kustomization.yaml
          git commit -m "Promote image to test: ${{ needs.build.outputs.image_tag }}" || echo "No changes to commit"
          # Use the GITHUB_TOKEN to authorize the push
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
