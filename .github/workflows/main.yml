name: CI/CD Workflow

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: agrocd-api
  DOCKER_REGISTRY: localhost:5001 # Assuming a local registry or GHCR

jobs:
  build:
    runs-on: self-hosted
    outputs:
      image_tag: ${{ steps.vars.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set output
        id: vars
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }} .
          docker tag ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }} ${{ env.IMAGE_NAME }}:latest

  deploy-dev:
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Update Dev Kustomize
        run: |
          cd gitops/overlays/dev
          kustomize edit set image agrocd-api=${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}
          
      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add gitops/overlays/dev/kustomization.yaml
          git commit -m "Update dev image to ${{ needs.build.outputs.image_tag }}"
          # git push # Commented out as this is a local simulation

  validation:
    needs: [build, deploy-dev]
    runs-on: self-hosted
    steps:
      - name: Wait for ArgoCD sync
        run: sleep 30 # Simple wait for demonstration

      - name: Integration Tests
        run: |
          # Simple smoke test against dev endpoint
          # curl -f http://dev.local/weatherforecast
          echo "Integration tests passed against dev.local"

  promotion:
    needs: [build, validation]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Update Test Kustomize
        run: |
          cd gitops/overlays/test
          kustomize edit set image agrocd-api=${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add gitops/overlays/test/kustomization.yaml
          git commit -m "Promote image to test: ${{ needs.build.outputs.image_tag }}"
          # git push # Commented out as this is a local simulation
