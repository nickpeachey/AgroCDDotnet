apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/nickpeachey/AgroCDDotnet'
    targetRevision: release/dev
    path: gitops/overlays/dev
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: api-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
---
