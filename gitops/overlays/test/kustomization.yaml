apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
namespace: api-test
patches:
- target:
    kind: Ingress
    name: agrocd-api
  patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: test.local
images:
- name: agrocd-api
  newName: agrocd-api
  newTag: latest
