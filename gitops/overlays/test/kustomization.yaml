apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- postgres-secret.yaml
- postgres-persistent-storage.yaml
namespace: api-test
patches:
- patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: test.local
  target:
    kind: Ingress
    name: agrocd-api
- patch: |-
    - op: replace
      path: /spec/template/spec/volumes/0
      value:
        name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-data
  target:
    kind: Deployment
    name: postgres
images:
- name: agrocd-api
  newName: ghcr.io/nickpeachey/agrocd-api
  newTag: d58deb4
- name: agrocd-db-migrator
  newName: ghcr.io/nickpeachey/agrocd-db-migrator
  newTag: d58deb4
