apiVersion: apps/v1
kind: Deployment
metadata:
  name: agrocd-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agrocd-api
  template:
    metadata:
      labels:
        app: agrocd-api
    spec:
      containers:
      - name: api
        image: agrocd-api:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: agrocd-api
spec:
  selector:
    app: agrocd-api
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agrocd-api
spec:
  ingressClassName: nginx
  rules:
  - host: api.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: agrocd-api
            port:
              number: 80
